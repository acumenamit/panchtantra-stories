<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Primary -->
    <title>Storyboard — Interactive Stories</title>
    <meta name="description" content="Interactive Panchatantra stories for children in English and Hindi — ancient wisdom, modern choices." />
    <meta name="author" content="Storyboard" />
    <meta name="keywords" content="Panchatantra, stories for kids, Hindi stories, interactive stories, children's stories, moral stories" />

    <!-- PWA manifest (Android, Windows, macOS Chrome/Edge) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d97706" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Storyboard" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57"   href="/icons/icon-57.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="/icons/icon-76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/icons/icon-114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- macOS Safari pinned tab -->
    <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#d97706" />

    <!-- Windows tile (Start menu / taskbar) -->
    <meta name="msapplication-TileColor"   content="#0d0a05" />
    <meta name="msapplication-TileImage"   content="/icons/icon-144.png" />
    <meta name="msapplication-config"      content="/browserconfig.xml" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Favicon — all browsers -->
    <link rel="icon" type="image/x-icon"    href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-256.png" />

    <!-- Open Graph — WhatsApp, Facebook, LinkedIn previews -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Storyboard" />
    <meta property="og:title"       content="Storyboard — Interactive Stories for Kids" />
    <meta property="og:description" content="Interactive Panchatantra stories in English and Hindi. Ancient wisdom, modern choices." />
    <meta property="og:image"       content="/icons/icon-512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Storyboard — Interactive Stories for Kids" />
    <meta name="twitter:description" content="Interactive Panchatantra stories in English and Hindi." />
    <meta name="twitter:image"       content="/icons/icon-512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Space+Mono:wght@400;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body style="margin:0;background:#0d0a05;">
    <div id="root"></div>
  </body>
</html>
